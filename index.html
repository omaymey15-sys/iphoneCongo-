<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Congo Store</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <h1>📱 iPhone Congo Store</h1>
  <nav>
    <button class="cat active" onclick="filterCategory('all')">Tous</button>
    <button class="cat" onclick="filterCategory('iphone')">iPhone</button>
    <button class="cat" onclick="filterCategory('samsung')">Samsung</button>
    <button class="cat" onclick="filterCategory('accessoire')">Accessoires</button>
  </nav>
</header>

<section class="novelties">
  <h2>Nouveautés 24H - iPhone</h2>
  <div class="novelty-container" id="newIphone"></div>
  <h2>Nouveautés 24H - Samsung</h2>
  <div class="novelty-container" id="newSamsung"></div>
  <h2>Nouveautés 24H - Accessoires</h2>
  <div class="novelty-container" id="newAccessory"></div>
</section>

<section class="products">
  <h2>Produits</h2>
  <div id="productContainer" class="product-grid"></div>
</section>

<script src="produit/iphone.js"></script>
<script src="produit/samsung.js"></script>
<script src="produit/accessoires.js"></script>
<script src="script.js"></script>
</body>
</html>
