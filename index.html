<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhoneCongo</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #020617;
}

.logo {
    font-weight: bold;
}

.icons {
    display: flex;
    gap: 15px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 20px;
}

.hero p {
    color: #94a3b8;
}

/* CATEGORIES */
.categories {
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

.cat {
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
}

/* PRODUITS */
.products {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.product {
    background: #1e293b;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <div class="logo">IPHONE CONGO</div>
    <div class="icons">
        🔍 ☰
    </div>
</header>

<section class="hero">
    <h2>Vente iPhone, Samsung & accessoires</h2>
    <p>📍 Kolwezi - Lubumbashi</p>
    <p>🚚 Livraison partout en RDC</p>
</section>

<section class="categories">
    <div class="cat">📱 iPhone</div>
    <div class="cat">📱 Samsung</div>
    <div class="cat">🎧 Accessoires</div>
</section>

<section class="products">

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <p>iPhone 11</p>
        <p>500$</p>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <p>Samsung S21</p>
        <p>450$</p>
    </div>

</section>

</body>
</html>
